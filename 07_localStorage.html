<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶段7：本地存储练习</title>
    <style>
        input, button {
            padding: 5px 8px;
            font-size: 16px;
            margin: 5px;
        }
        #result {
            color: #0066cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <input type="text" id="storageInput" placeholder="输入要保存的文字">
    <button id="saveBtn">保存数据</button>
    <button id="clearBtn">清空存储</button>
    <p>已保存内容：<span id="result"></span></p>

    <h3>知识点：localStorage.setItem/getItem/removeItem，页面刷新数据不丢失</h3>
    <script>
        let inp = document.getElementById("storageInput");
        let save = document.getElementById("saveBtn");
        let clear = document.getElementById("clearBtn");
        let res = document.getElementById("result");

        // 页面加载读取本地存储
        window.onload = function () {
            let data = localStorage.getItem("userText");
            res.innerText = data ?? "无数据";
        }

        // 保存按钮点击事件
        save.addEventListener("click", () => {
            // 去除首尾空格
            let content = inp.value.trim();
            if (content === "") {
                res.innerText = "不能保存空内容！";
                res.style.color = "red";
                return;
            }
            // 存入本地存储
            localStorage.setItem("userText", content);
            res.innerText = content;
            res.style.color = "#0066cc";
        })

        // 清空按钮点击事件
        clear.addEventListener("click", () => {
            localStorage.removeItem("userText");
            res.innerText = "无数据";
            res.style.color = "#0066cc";
            inp.value = "";
        })
    </script>
</body>
</html>
