<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>笔记本 1.0 | JS全套学习索引</title>
    <style>
        /* 原有弹窗样式完整保留 */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        /* 全局统一样式，和所有作业页面风格对齐 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: "微软雅黑";
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #ddd;
        }

        #appTitle {
            text-align: center;
            color: #222;
            margin-bottom: 15px;
        }

        #noteDisplay {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.8;
            padding: 12px;
            border-left: 4px solid #1a5298;
            background: #f0f7ff;
        }

        h2 {
            text-align: center;
            color: #666;
            margin: 30px 0;
            font-size: 20px;
        }

        /* 导航菜单样式 */
        .nav-title {
            font-size: 20px;
            color: #1a5298;
            margin: 40px 0 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        ul {
            list-style: none;
        }

        li {
            margin: 12px 0;
            padding: 10px 14px;
            border: 1px solid #eee;
            border-radius: 6px;
            transition: 0.2s ease;
        }

        li:hover {
            background: #f0f7ff;
            border-color: #1a5298;
        }

        a {
            text-decoration: none;
            font-size: 17px;
            color: #1a5298;
            display: block;
        }
    </style>
</head>

    <script>
        // 原有弹窗逻辑完整保留：2秒自动消失提示语
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
