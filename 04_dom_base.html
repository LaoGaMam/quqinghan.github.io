<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端视口（补充规范标签） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶段4：DOM基础操作</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            border: 1px solid #000;
            /* 增加居中优化，视觉更好 */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h2 id="title">原始标题</h2>
    <div class="box" id="boxDom">我是盒子</div>

    <h3>知识点：getElementById、innerText、style修改样式</h3>
    <script>
        // 1. 通过id获取DOM元素
        let title = document.getElementById("title");
        let box = document.getElementById("boxDom");

        // 判空容错：防止id写错获取null报错
        if (title) {
            // 修改元素纯文本内容
            title.innerText = "JS修改后的标题";
        }
        if (box) {
            // JS修改样式规则：短横线样式转驼峰命名
            box.style.backgroundColor = "#eee";
            box.style.color = "#f00";
            box.style.fontSize = "18px";
        }
    </script>
</body>
</html>
